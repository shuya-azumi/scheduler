<!DOCTYPE html>
<html lang="ja">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>面接日程調整（MVP）</title>
  <link rel="stylesheet" href="css/style.css">
</head>

<body>

  <!-- ========== 参加画面（最初に出る）========== -->
  <div id="join-screen" class="screen">
    <div class="card">
      <div class="brand">
        <span class="brand-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><rect x="3" y="4.5" width="18" height="16" rx="2.5"/><path d="M3 9.5h18"/><path d="M8 2.5v4M16 2.5v4"/><path d="M8.8 14.5l2.2 2.2 4.2-4.2"/></svg>
        </span>
        <h1>面接 日程調整</h1>
      </div>
      <p class="room-line">ルーム：<span id="room-label"></span></p>

      <label>お名前</label>
      <input type="text" id="join-name" placeholder="例：山田 太郎">

      <label>あなたの立場</label>
      <div id="role-select">
        <button class="role-btn" data-role="candidate">
          <svg class="role-ico role-candidate" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="12" cy="8" r="3.5"/><path d="M5 20c0-3.6 3.1-5.5 7-5.5s7 1.9 7 5.5"/></svg>
          <span>求職者</span>
        </button>
        <button class="role-btn" data-role="agent">
          <svg class="role-ico role-agent" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><rect x="3" y="7.5" width="18" height="12" rx="2"/><path d="M8.5 7.5V6a2 2 0 0 1 2-2h3a2 2 0 0 1 2 2v1.5"/><path d="M3 13h18"/></svg>
          <span>エージェント</span>
        </button>
        <button class="role-btn" data-role="facility">
          <svg class="role-ico role-facility" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><rect x="4" y="3.5" width="16" height="17" rx="1"/><path d="M8.5 7.5h2M13.5 7.5h2M8.5 11.5h2M13.5 11.5h2"/><path d="M10 20.5v-3.5h4v3.5"/></svg>
          <span>事業所</span>
        </button>
      </div>

      <button id="join-btn" class="primary" disabled>このルームに参加する</button>
      <p class="hint">同じURLを3者で共有すると、同じルームに入れます。</p>
    </div>
  </div>

  <!-- ========== メイン画面（参加後に出る）========== -->
  <div id="main-screen" class="screen hidden">
    <header>
      <div class="header-inner">
        <div class="brand-mini">
          <span class="brand-icon brand-icon--sm">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><rect x="3" y="4.5" width="18" height="16" rx="2.5"/><path d="M3 9.5h18"/><path d="M8 2.5v4M16 2.5v4"/><path d="M8.8 14.5l2.2 2.2 4.2-4.2"/></svg>
          </span>
          <strong id="main-title">面接 日程調整</strong>
        </div>
        <div class="header-actions">
          <button id="copy-url" class="ghost">招待URLをコピー</button>
          <button id="leave-btn" class="ghost">退出（入り直す）</button>
        </div>
      </div>
    </header>

    <div id="confirmed-banner" class="banner hidden"></div>

    <!-- あなた（誰の画面か）を候補日時の上に明示 -->
    <div class="me-bar">
      <span class="me-bar-cap">あなた</span>
      <span id="me-label" class="me-label"></span>
    </div>

    <div class="layout">
      <!-- 左：候補枠パネル -->
      <section class="panel">
        <h2>候補日時</h2>
        <div id="slots"></div>

        <!-- エージェントだけに表示される枠追加フォーム -->
        <div id="add-slot-box" class="add-slot hidden">
          <label>候補を追加（エージェント用）</label>
          <div class="slot-form">
            <input type="date" id="slot-date">
            <div class="time-row">
              <select id="slot-start"></select>
              <span>〜</span>
              <select id="slot-end"></select>
            </div>
          </div>
          <button id="add-slot-btn" class="primary small">候補を追加</button>
        </div>
      </section>

      <!-- 右：チャット -->
      <section class="panel chat-panel">
        <h2>やりとり</h2>
        <div id="messages"></div>
        <div id="quick-replies" class="quick-replies"></div>
        <div class="chat-input">
          <input type="text" id="chat-text" placeholder="メッセージを入力…">
          <button id="send-btn" class="primary small">送信</button>
        </div>
      </section>
    </div>
  </div>

  <!-- ===== jQuery（講義と同じ）===== -->
  <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.6.0/jquery.min.js"></script>

  <!-- ===== アプリ本体（JavaScript は js/app.js に分離）===== -->
  <script type="module" src="js/app.js"></script>
</body>

</html>
